<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>2048 Superalimentos</title>

<style>

body{
font-family:Arial;
background:#f0fdf4;
display:flex;
flex-direction:column;
align-items:center;
margin-top:40px;
}

h1{
color:#16a34a;
}

#game{
display:grid;
grid-template-columns:repeat(4,90px);
gap:10px;
background:#bbada0;
padding:10px;
border-radius:10px;
}

.tile{
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
font-size:35px;
font-weight:bold;
background:#cdc1b4;
border-radius:6px;
}

.score{
margin:20px;
font-size:20px;
}

</style>
</head>

<body>

<h1>2048 Superalimentos</h1>

<div class="score">
Puntos: <span id="score">0</span>
</div>

<div id="game"></div>

<script>

const size=4

let board=[]
let score=0

const foods={
2:"🍎",
4:"🥑",
8:"🥦",
16:"🫐",
32:"🍊",
64:"🥩",
128:"🥗",
256:"🏆"
}

function startGame(){

board=Array(size).fill().map(()=>Array(size).fill(0))

score=0

addTile()
addTile()

draw()

}

function addTile(){

let empty=[]

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
if(board[r][c]==0){
empty.push({r,c})
}
}
}

if(empty.length===0) return

let spot=empty[Math.floor(Math.random()*empty.length)]

board[spot.r][spot.c]=Math.random()<0.9?2:4

}

function draw(){

const game=document.getElementById("game")

game.innerHTML=""

for(let r=0;r<size;r++){
for(let c=0;c<size;c++){

let tile=document.createElement("div")

tile.className="tile"

let value=board[r][c]

tile.innerHTML=value?foods[value]:""

game.appendChild(tile)

}
}

document.getElementById("score").innerText=score

}

function slide(row){

row=row.filter(v=>v)

for(let i=0;i<row.length-1;i++){

if(row[i]==row[i+1]){

row[i]*=2

score+=row[i]

row.splice(i+1,1)

}

}

while(row.length<size){
row.push(0)
}

return row

}

function moveLeft(){

for(let r=0;r<size;r++){

board[r]=slide(board[r])

}

}

function moveRight(){

for(let r=0;r<size;r++){

board[r]=slide(board[r].reverse()).reverse()

}

}

function moveUp(){

for(let c=0;c<size;c++){

let col=[board[0][c],board[1][c],board[2][c],board[3][c]]

col=slide(col)

for(let r=0;r<size;r++){
board[r][c]=col[r]
}

}

}

function moveDown(){

for(let c=0;c<size;c++){

let col=[board[0][c],board[1][c],board[2][c],board[3][c]].reverse()

col=slide(col).reverse()

for(let r=0;r<size;r++){
board[r][c]=col[r]
}

}

}

document.addEventListener("keydown",e=>{

let moved=true

switch(e.key){

case "ArrowLeft":
moveLeft()
break

case "ArrowRight":
moveRight()
break

case "ArrowUp":
moveUp()
break

case "ArrowDown":
moveDown()
break

default:
moved=false

}

if(moved){

addTile()

draw()

}

})

/* soporte swipe celular */

let startX=0
let startY=0

document.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
startY=e.touches[0].clientY
})

document.addEventListener("touchend",e=>{

let dx=e.changedTouches[0].clientX-startX
let dy=e.changedTouches[0].clientY-startY

if(Math.abs(dx)>Math.abs(dy)){

if(dx>30) moveRight()
if(dx<-30) moveLeft()

}else{

if(dy>30) moveDown()
if(dy<-30) moveUp()

}

addTile()
draw()

})

startGame()

</script>

</body>
</html>
